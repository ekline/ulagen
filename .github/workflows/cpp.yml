name: cpp

on:
  push:
    branches: [main]
    paths:
      - 'impl/cpp/**'
      - '.github/workflows/cpp.yml'
  pull_request:
    paths:
      - 'impl/cpp/**'
      - '.github/workflows/cpp.yml'

defaults:
  run:
    working-directory: impl/cpp

jobs:
  test:
    name: test (${{ matrix.os }} / ${{ matrix.cxx }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cxx: g++
          - os: ubuntu-latest
            cxx: clang++
          - os: macos-latest
            cxx: clang++
    env:
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v5
      - run: ${{ matrix.cxx }} --version
      - run: make check
      - run: make ula

  sanitizers:
    name: asan + ubsan (ubuntu / clang++)
    runs-on: ubuntu-latest
    env:
      CXX: clang++
      CXXFLAGS: -fsanitize=address,undefined -fno-omit-frame-pointer -O1 -g
      LDFLAGS: -fsanitize=address,undefined
      ASAN_OPTIONS: detect_leaks=1
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
    steps:
      - uses: actions/checkout@v5
      - run: clang++ --version
      - run: make check
      - run: make ula
