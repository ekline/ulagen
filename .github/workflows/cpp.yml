name: cpp

on:
  push:
    branches: [main]
    paths:
      - 'impl/cpp/**'
      - '.github/workflows/cpp.yml'
  pull_request:
    paths:
      - 'impl/cpp/**'
      - '.github/workflows/cpp.yml'

defaults:
  run:
    working-directory: impl/cpp

jobs:
  test:
    name: test (${{ matrix.os }} / ${{ matrix.cxx }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cxx: g++
          - os: ubuntu-latest
            cxx: clang++
          - os: macos-latest
            cxx: clang++
    env:
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v5
      - run: ${{ matrix.cxx }} --version
      - run: make check
      - run: make ula

  sanitizers:
    name: asan + ubsan (ubuntu / clang++)
    runs-on: ubuntu-latest
    env:
      CXX: clang++
      CXXFLAGS: -fsanitize=address,undefined -fno-omit-frame-pointer -O1 -g
      LDFLAGS: -fsanitize=address,undefined
      ASAN_OPTIONS: detect_leaks=1
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
    steps:
      - uses: actions/checkout@v5
      - run: clang++ --version
      - run: make check
      - run: make ula

  lint:
    name: clang-format + clang-tidy
    runs-on: ubuntu-latest
    # Pin to a specific LLVM major version so CI matches the version
    # used to author the .clang-format / .clang-tidy configs and to
    # format the existing source. Bumping this is intentional and
    # may require running clang-format-${LLVM_VERSION} -i locally.
    env:
      LLVM_VERSION: '22'
    steps:
      - uses: actions/checkout@v5
      - name: Install pinned clang-format and clang-tidy from apt.llvm.org
        run: |
          set -eux
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh "${LLVM_VERSION}"
          sudo apt-get install -y "clang-format-${LLVM_VERSION}" "clang-tidy-${LLVM_VERSION}"
      - run: |
          clang-format-${LLVM_VERSION} --version
          clang-tidy-${LLVM_VERSION} --version
      - name: clang-format check (formats in place, fails on diff)
        run: |
          clang-format-${LLVM_VERSION} -i *.cc *.h
          git diff --exit-code -- *.cc *.h
      - name: clang-tidy
        run: clang-tidy-${LLVM_VERSION} *.cc -- -x c++ -std=c++17 -I.
