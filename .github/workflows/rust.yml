# NOTE: this file is currently nested inside the crate directory.
# Before it will run, move it up to the repository root so it lives at
#   <repo>/.github/workflows/rust.yml
#
# It runs from the `impl/rust` working directory.

name: rust

on:
  push:
    branches: [main]
    paths:
      - 'impl/rust/**'
      - '.github/workflows/rust.yml'
  pull_request:
    paths:
      - 'impl/rust/**'
      - '.github/workflows/rust.yml'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

defaults:
  run:
    working-directory: impl/rust

jobs:
  test:
    name: test (${{ matrix.os }} / ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable, "1.85"]  # MSRV
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - run: cargo build --all-targets
      - run: cargo test --all-targets
      - run: cargo test --doc

  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings

  docs:
    name: rustdoc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo doc --no-deps
